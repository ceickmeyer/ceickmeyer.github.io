    <style>
      /* ── Control panel styles ─────────────────────────────────── */
      #control-panel {
        max-width: 480px;
        margin: 24px auto 48px;
        padding: 0 16px;
        font-family: Inter, sans-serif;
      }

      #control-panel h2 {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #444;
        margin-bottom: 16px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 8px;
      }

      .cp-field {
        display: flex;
        flex-direction: column;
        margin-bottom: 14px;
      }

      .cp-field label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #666;
        margin-bottom: 5px;
      }

      .cp-field input {
        font-size: 17px;
        padding: 12px 14px;
        border: 1.5px solid #ccc;
        border-radius: 8px;
        outline: none;
        width: 100%;
        -webkit-appearance: none;
      }

      .cp-field input:focus {
        border-color: #c8102e;
      }

      /* Autocomplete dropdown */
      #team-suggestions {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1.5px solid #ccc;
        border-top: none;
        border-radius: 0 0 8px 8px;
        background: #fff;
        max-height: 220px;
        overflow-y: auto;
        display: none;
        position: relative;
        z-index: 100;
      }

      #team-suggestions li {
        padding: 12px 14px;
        font-size: 16px;
        cursor: pointer;
        border-bottom: 1px solid #f0f0f0;
      }

      #team-suggestions li:last-child {
        border-bottom: none;
      }

      #team-suggestions li:hover,
      #team-suggestions li.active {
        background: #f5e8ea;
      }

      /* Row of three inputs */
      .cp-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 14px;
      }

      .cp-row .cp-field {
        margin-bottom: 0;
      }

      /* Update button */
      #update-btn {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: #fff;
        background: #c8102e;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 4px;
        -webkit-appearance: none;
      }

      #update-btn:active {
        background: #a00d25;
      }

      .cp-field select {

        padding: 12px 14px;
        border: 1.5px solid #ccc;
        border-radius: 8px;
        outline: none;

        background-size: 10px;
      }

      .cp-field select:focus {
        border-color: #c8102e;
      }

  <script>
    // ── MLB team data: full name → short nickname ──────────────────
    const MLB_TEAMS = [
      { full: "Arizona Diamondbacks",    short: "Diamondbacks" },
      { full: "Atlanta Braves",          short: "Braves" },
      { full: "Baltimore Orioles",       short: "Orioles" },
      { full: "Boston Red Sox",          short: "Red Sox" },
      { full: "Chicago Cubs",            short: "Cubs" },
      { full: "Chicago White Sox",       short: "White Sox" },
      { full: "Cincinnati Reds",         short: "Reds" },
      { full: "Cleveland Guardians",     short: "Guardians" },
      { full: "Colorado Rockies",        short: "Rockies" },
      { full: "Detroit Tigers",          short: "Tigers" },
      { full: "Houston Astros",          short: "Astros" },
      { full: "Kansas City Royals",      short: "Royals" },
      { full: "Los Angeles Angels",      short: "Angels" },
      { full: "Los Angeles Dodgers",     short: "Dodgers" },
      { full: "Miami Marlins",           short: "Marlins" },
      { full: "Milwaukee Brewers",       short: "Brewers" },
      { full: "Minnesota Twins",         short: "Twins" },
      { full: "New York Mets",           short: "Mets" },
      { full: "New York Yankees",        short: "Yankees" },
      { full: "Oakland Athletics",       short: "Athletics" },
      { full: "Philadelphia Phillies",   short: "Phillies" },
      { full: "Pittsburgh Pirates",      short: "Pirates" },
      { full: "San Diego Padres",        short: "Padres" },
      { full: "San Francisco Giants",    short: "Giants" },
      { full: "Seattle Mariners",        short: "Mariners" },
      { full: "St. Louis Cardinals",     short: "Cardinals" },
      { full: "Tampa Bay Rays",          short: "Rays" },
      { full: "Texas Rangers",           short: "Rangers" },
      { full: "Toronto Blue Jays",       short: "Blue Jays" },
      { full: "Washington Nationals",    short: "Nationals" }
    ];

    let selectedTeam = null; // currently selected team object

    function initAutocomplete() {
      const input = document.getElementById("team-input");
      const list  = document.getElementById("team-suggestions");
      let activeIdx = -1;

      input.addEventListener("input", () => {
        const q = input.value.trim().toLowerCase();
        list.innerHTML = "";
        activeIdx = -1;
        selectedTeam = null;

        if (!q) { list.style.display = "none"; return; }

        const matches = MLB_TEAMS.filter(t =>
          t.full.toLowerCase().includes(q) || t.short.toLowerCase().includes(q)
        );

        if (!matches.length) { list.style.display = "none"; return; }

        matches.forEach((team, i) => {
          const li = document.createElement("li");
          li.textContent = team.full;
          li.addEventListener("mousedown", (e) => {
            e.preventDefault(); // keep focus on input briefly so blur doesn't fire first
            selectTeam(team);
          });
          list.appendChild(li);
        });

        list.style.display = "block";
      });

      // Keyboard nav
      input.addEventListener("keydown", (e) => {
        const items = list.querySelectorAll("li");
        if (!items.length) return;
        if (e.key === "ArrowDown") {
          e.preventDefault();
          activeIdx = Math.min(activeIdx + 1, items.length - 1);
          items.forEach((el, i) => el.classList.toggle("active", i === activeIdx));
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          activeIdx = Math.max(activeIdx - 1, 0);
          items.forEach((el, i) => el.classList.toggle("active", i === activeIdx));
        } else if (e.key === "Enter" && activeIdx >= 0) {
          e.preventDefault();
          const matches = MLB_TEAMS.filter(t =>
            t.full.toLowerCase().includes(input.value.trim().toLowerCase()) ||
            t.short.toLowerCase().includes(input.value.trim().toLowerCase())
          );
          if (matches[activeIdx]) selectTeam(matches[activeIdx]);
        } else if (e.key === "Escape") {
          list.style.display = "none";
        }
      });

      input.addEventListener("blur", () => {
        setTimeout(() => { list.style.display = "none"; }, 150);
      });
    }

    function selectTeam(team) {
      selectedTeam = team;
      document.getElementById("team-input").value = team.full;
      document.getElementById("team-suggestions").style.display = "none";
    }

    // ── Format today's date as "Sat, Jul 5" ───────────────────────
    function getTodayFormatted() {
      const now = new Date();
      const days   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return days[now.getDay()] + ", " + months[now.getMonth()] + " " + now.getDate();
    }

    function updateDatetime() {
      const time = document.getElementById("time-select").value;
      const dateStr = getTodayFormatted() + " • " + time;
      document.getElementById("ticket-datetime").textContent = dateStr;
    }

    
    function updateTicket() {
      const sect  = document.getElementById("user_sect_input").value.trim();
      const row   = document.getElementById("user_row_input").value.trim();
      const seat  = document.getElementById("user_seat_input").value.trim();
      const teamFull  = selectedTeam ? selectedTeam.full  : document.getElementById("team-input").value.trim();
      const teamShort = selectedTeam ? selectedTeam.short : teamFull; // fallback: use whatever was typed

      // Update ticket display
      if (sect) document.getElementById("user_sect").textContent = sect;
      if (row)  document.getElementById("user_row").textContent  = row;
      if (seat) document.getElementById("user_seat").textContent = seat;

      if (teamFull) {
        document.getElementById("ticket-title").textContent = teamFull + " at Washington Nationals";
        document.getElementById("ticket-subtitle").textContent = teamShort + " @ Nationals";
      }

      // Update datetime
      updateDatetime();

      // Persist to localStorage
      const time = document.getElementById("time-select").value;
      const saved = { sect, row, seat, teamFull, teamShort, time };
      localStorage.setItem("ticketSettings", JSON.stringify(saved));

      // Flash confirmation
      const notice = document.getElementById("saved-notice");
      notice.style.opacity = "1";
      notice.textContent = "✓ Saved";
      setTimeout(() => { notice.style.opacity = "0"; }, 2000);
    }

    // ── Restore saved values on page load ─────────────────────────
    window.addEventListener("DOMContentLoaded", () => {
      initAutocomplete();

      // Always show today's date immediately on load
      const defaultTime = document.getElementById("time-select").value;
      document.getElementById("ticket-datetime").textContent = getTodayFormatted() + " • " + defaultTime;

      const raw = localStorage.getItem("ticketSettings");
      if (!raw) return;
      try {
        const s = JSON.parse(raw);
        if (s.sect) {
          document.getElementById("user_sect_input").value = s.sect;
          document.getElementById("user_sect").textContent = s.sect;
        }
        if (s.row) {
          document.getElementById("user_row_input").value = s.row;
          document.getElementById("user_row").textContent = s.row;
        }
        if (s.seat) {
          document.getElementById("user_seat_input").value = s.seat;
          document.getElementById("user_seat").textContent = s.seat;
        }
        if (s.teamFull) {
          document.getElementById("team-input").value = s.teamFull;
          selectedTeam = { full: s.teamFull, short: s.teamShort };
          document.getElementById("ticket-title").textContent    = s.teamFull + " at Washington Nationals";
          document.getElementById("ticket-subtitle").textContent = s.teamShort + " @ Nationals";
        }
        if (s.time) {
          document.getElementById("time-select").value = s.time;
        }
        // Re-render datetime with today's date + saved (or default) time
        const restoredTime = s.time || document.getElementById("time-select").value;
        document.getElementById("ticket-datetime").textContent = getTodayFormatted() + " • " + restoredTime;
      } catch(e) { /* ignore corrupt storage */ }
    });
  </script>

    <!-- ── Control Panel ──────────────────────────────────────────── -->
    <div id="control-panel">
      <h2>Ticket Settings</h2>

      <!-- Visiting team with autocomplete -->
      <div class="cp-field">
        <label for="team-input">Visiting Team</label>
        <input
          type="text"
          id="team-input"
          placeholder="Type team name…"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <ul id="team-suggestions"></ul>
      </div>

      <!-- Game time selector -->
      <div class="cp-field">
        <label for="time-select">Game Time</label>
        <select id="time-select">
          <option value="4:05 PM">Saturday – 4:05 PM</option>
          <option value="1:35 PM">Sunday – 1:35 PM</option>
          <option value="6:45 PM">Evening – 6:45 PM</option>
          <option value="12:05 PM">Weekday Day – 12:05 PM</option>
          <option value="1:05 PM">Weekday Day – 1:05 PM</option>
        </select>
      </div>

      <!-- Section / Row / Seat side by side -->
      <div class="cp-row">
        <div class="cp-field">
          <label for="user_sect_input">Section</label>
          <input type="text" id="user_sect_input" placeholder="e.g. 104" inputmode="text" />
        </div>
        <div class="cp-field">
          <label for="user_row_input">Row</label>
          <input type="text" id="user_row_input" placeholder="e.g. F" inputmode="text" />
        </div>
        <div class="cp-field">
          <label for="user_seat_input">Seat</label>
          <input type="text" id="user_seat_input" placeholder="e.g. 7" inputmode="numeric" />
        </div>
      </div>

      <button id="update-btn" onclick="updateTicket()">Update Ticket</button>
      <div id="saved-notice"></div>
    </div>
